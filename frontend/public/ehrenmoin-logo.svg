<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 84" role="img" aria-label="EhrenMoin – Ehrenamt in Hamburg">
  <!-- Bildmarke: Anker mit Herz-Ring -->
  <rect x="2" y="2" width="80" height="80" rx="20" fill="#357f97"/>
  <path d="M82 2 L82 26 L58 2 Z" fill="#f7c600"/>
  <!-- Herz als Anker-Ring -->
  <path d="M42 16 c-3.5 -6 -13 -5.5 -13 2 c0 5.5 8 10 13 14 c5 -4 13 -8.5 13 -14 c0 -7.5 -9.5 -8 -13 -2 z" fill="#f7c600"/>
  <!-- Anker -->
  <line x1="42" y1="32" x2="42" y2="64" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="29" y1="41" x2="55" y2="41" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <path d="M22 50 a20 20 0 0 0 40 0" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <path d="M22 50 l-5 -4 m5 4 l6 -1" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M62 50 l5 -4 m-5 4 l-6 -1" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Wortmarke -->
  <text x="98" y="50" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="800" letter-spacing="-0.5" fill="#1d1d1b">Ehren<tspan fill="#357f97">Moin</tspan></text>
  <text x="99" y="72" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12.5" font-weight="700" letter-spacing="2.4" fill="#5b6b73">EHRENAMT IN HAMBURG</text>
</svg>

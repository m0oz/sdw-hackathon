<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf4f7"/>
      <stop offset="1" stop-color="#f6f9fa"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcdce6"/>
      <stop offset="1" stop-color="#9ecbd9"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="520" fill="url(#sky)"/>
  <circle cx="1240" cy="120" r="74" fill="#f7c600" opacity="0.35"/>

  <!-- Skyline-Silhouette (vereinfacht: Michel, Speicherstadt, Elbphilharmonie, Kräne) -->
  <g fill="#5aa7bb" opacity="0.30">
    <!-- Michel -->
    <rect x="170" y="250" width="46" height="170"/>
    <rect x="181" y="215" width="24" height="40"/>
    <path d="M181 215 L193 178 L205 215 Z"/>
    <circle cx="193" cy="238" r="9" fill="#f6f9fa"/>
    <!-- Speicherstadt-Giebel -->
    <path d="M280 420 V310 L310 285 L340 310 V420 Z"/>
    <path d="M350 420 V320 L378 297 L406 320 V420 Z"/>
    <path d="M416 420 V310 L446 285 L476 310 V420 Z"/>
    <!-- Fernsehturm -->
    <rect x="585" y="190" width="10" height="230"/>
    <ellipse cx="590" cy="195" rx="26" ry="14"/>
    <rect x="587" y="130" width="6" height="60"/>
    <!-- Elbphilharmonie -->
    <rect x="700" y="320" width="190" height="100"/>
    <path d="M700 320 Q748 270 795 305 Q843 340 890 280 L890 320 Z"/>
    <!-- Bürohäuser -->
    <rect x="930" y="300" width="58" height="120"/>
    <rect x="1000" y="330" width="46" height="90"/>
    <!-- Hafenkräne -->
    <path d="M1130 420 V300 L1124 300 V420 Z M1127 305 L1210 268 L1208 276 L1130 312 Z M1210 268 L1210 300" stroke="#5aa7bb" stroke-width="7" fill="none"/>
    <path d="M1300 420 V290 L1294 290 V420 Z M1297 295 L1390 260 L1388 268 L1300 302 Z" stroke="#5aa7bb" stroke-width="7" fill="none"/>
    <path d="M1382 262 V330" stroke="#5aa7bb" stroke-width="4"/>
    <rect x="1372" y="330" width="20" height="16"/>
  </g>

  <!-- Wasser -->
  <rect y="420" width="1600" height="100" fill="url(#water)" opacity="0.5"/>
  <path d="M0 430 Q200 418 400 430 T800 430 T1200 430 T1600 430 V520 H0 Z" fill="#5aa7bb" opacity="0.18"/>
  <path d="M0 460 Q200 448 400 460 T800 460 T1200 460 T1600 460 V520 H0 Z" fill="#357f97" opacity="0.14"/>
  <!-- Segelboot -->
  <g opacity="0.55">
    <path d="M520 438 L600 438 L585 456 L535 456 Z" fill="#357f97"/>
    <path d="M558 438 V380 L596 432 Z" fill="#f7c600"/>
    <path d="M554 438 V390 L526 432 Z" fill="#ffffff"/>
  </g>
</svg>

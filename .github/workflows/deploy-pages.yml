name: Deploy frontend to GitHub Pages

# Baut das React-Frontend und veröffentlicht es auf GitHub Pages.
# Das Backend läuft separat (siehe render.yaml). Die Backend-URL wird über die
# Repo-Variable VITE_API_URL eingespeist:
#   Settings → Secrets and variables → Actions → Variables → New variable
#   Name: VITE_API_URL   Wert: https://<dein-render-dienst>.onrender.com
#
# Einmalig aktivieren: Settings → Pages → Build and deployment → Source: GitHub Actions

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deploys vermeiden, laufende aber nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          # Backend-URL aus der Repo-Variable; ohne sie zeigt die App ins Leere.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        # base muss dem Repo-Namen entsprechen (Projektseite: user.github.io/<repo>/).
        run: npx vite build --base=/sdw-hackathon/
      - name: Statische Seiten beilegen (praesentation.html, pitch.html)
        # Beide Decks referenzieren nur relative Pfade — Ordnerstruktur 1:1 übernehmen.
        # assets/ wird in das von Vite erzeugte dist/assets/ gemerged (Dateinamen
        # kollidieren nicht, Vite hasht seine Bundles).
        run: |
          cp praesentation.html pitch.html frontend/dist/
          cp -R assets/. frontend/dist/assets/
          cp -R pitch-assets frontend/dist/
          mkdir -p frontend/dist/frontend/public
          cp frontend/public/ehrenmoin-logo.svg frontend/dist/frontend/public/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
